<!DOCTYPE html>
<html lang="hu">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="discription"
      content="Fontos számodra, hogy a kezed ápolt legyen és már ki is találtad mit szeretnél? Jelentkezz be, és csináljuk meg együtt álmaid körmét!"
    />
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <link rel="stylesheet" href="css/styles.css" />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css?family=Sofia"
    />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css?family=Roboto"
    />
    <title>Körömparadicsom | Bejelentkezés</title>
  </head>
  <body>
    <div class="contener">
      <header>
        <h1><i>K</i>örömparadicsom</h1>
      </header>
      <nav>
        <a href="index.html">Főoldal</a>
        <a href="szolgaltatasok.html">Szolgáltatások</a>
        <a href="bejelentkezes.html">Bejelentkezés</a>
      </nav>

      <form>
        <h3><u>Közvetlen üzenet küldése</u></h3>
        <div>
          <label for="name" id="label_name"> <b>Név</b> </label>
          <input
            type="text"
            name="name"
            id="name"
            placeholder="pl. Példa Aladár"
          />
        </div>
        <div>
          <label for="e-mail" id="label_email"> <b>E-mail cím</b></label>
          <input
            type="email"
            name="e-mail"
            id="e-mail"
            placeholder="pl.pelda.aladar@gmail.com"
          />
        </div>
        <div>
          <label for="telephone" id="label_tel"><b>Telefonszám </b></label>
          <input
            type="tel"
            name="telephone"
            id="telephone"
            placeholder="+36701234567"
          />
        </div>
        <h4>Szolgáltatás</h4>
        <div>
          <input type="radio" id="javitas" name="nail" />
          <label for="javitas">Javítás vagy pótlás</label>
        </div>
        <div>
          <input type="radio" id="manikur" name="nail" />
          <label for="manikur">Gépi manikűr</label>
        </div>
        <div>
          <input type="radio" id="gel_lak" name="nail" />
          <label for="gel_lak">Erősített gél lak</label>
        </div>
        <div>
          <input type="radio" id="mukorom" name="nail" />
          <label for="mukorom">Épített műköröm</label>
        </div>
        <h4>Díszítés</h4>
        <div>
          <input type="checkbox" id="egy_szin" />
          <label for="egy_szin">Egy színű</label>
        </div>

        <div>
          <input type="checkbox" id="ket_szin" />
          <label for="ket_szin">Két színű</label>
        </div>
        <div>
          <input type="checkbox" id="tobb_szin" />
          <label for="tobb_szin">Három vagy több szín</label>
        </div>
        <div>
          <input type="checkbox" id="kovek" />
          <label for="kovek">Köves díszítés</label>
        </div>
        <h4>Épített köröm mérete</h4>
        <select name="meret" id="meret">
          <option value="-">-</option>
          <option value="S">S</option>
          <option value="M">M</option>
          <option value="L">L</option>
          <option value="XL">XL</option>
          <option value="XXL">XXL</option>
        </select>
        <h4>Egyéb üzenet</h4>
        <div>
          <textarea name="massage" id="massage" cols="30" rows="10"></textarea>
        </div>
        <button><b>Küldés</b></button>
      </form>
    </div>

    <footer>
      <iframe
        src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d2695.2919147776274!2d19.065065176121426!3d47.5037059711806!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x4741dc6f74ced879%3A0xb6ddf789c6d02257!2sBudapest%2C%20Kir%C3%A1ly%20u.%2071%2C%201077!5e0!3m2!1shu!2shu!4v1699533678685!5m2!1shu!2shu"
        width="600"
        height="450"
        style="border: 0"
        allowfullscreen=""
        loading="lazy"
        referrerpolicy="no-referrer-when-downgrade"
      ></iframe>
    </footer>
    <script>
      $(document).ready(function () {
        $("button").click(function () {
          alert("Hamarosan felveszem veled a kapcsolatot!");
        });
      });
    </script>
  </body>
</html>
