<!DOCTYPE html>
<html lang="hu">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="discription"
      content="Fontos számodra, hogy a kezed ápolt legyen és már ki is találtad mit szeretnél? Jelentkezz be, és csináljuk meg együtt álmaid körmét!"
    />
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <link rel="stylesheet" href="css/styles.css" />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css?family=Sofia"
    />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css?family=Roboto"
    />
    <link
    rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    <title>Körömparadicsom | Bejelentkezés</title>
  </head>
  <body>
    <div class="contener">
      <header class=" animate__animated animate__zoomIn">
        <h1><i>K</i>örömparadicsom</h1>
      </header>
      <nav>
        <a href="index.html">Főoldal</a>
        <a href="szolgaltatasok.html">Szolgáltatások</a>
        <a href="bejelentkezes.html">Bejelentkezés</a>
      </nav>

      <form  action="https://formsubmit.co/renaschumi74@gmail.com" method="POST">
        <h3><u>Közvetlen üzenet küldése</u></h3>
        <div> 
          <label for="name" id="label_name"> <b>Név</b> </label>
          <input
            type="text"
            name="name"
            id="name"
            placeholder="pl. Példa Aladár"
         required />
        </div>
        <div>
          <label for="e-mail" id="label_email"> <b>E-mail cím</b></label>
          <input
            type="email"
            name="e-mail"
            id="e-mail"
            placeholder="pl.pelda.aladar@gmail.com"
        required  />
        </div>
        <div>
          <label for="telephone" id="label_tel"><b>Telefonszám </b></label>
          <input
            type="tel"
            name="telephone"
            id="telephone"
            placeholder="+36701234567"
        required  />
        </div>
        <h4>Szolgáltatás</h4>
        <div>
          <input type="radio" id="repair" name="nail" />
          <label for="repair">Javítás vagy pótlás</label>
        </div>
        <div>
          <input type="radio" id="manicure" name="nail" />
          <label for="manicure">Gépi manikűr</label>
        </div>
        <div>
          <input type="radio" id="gel_polish" name="nail" />
          <label for="gel_polish">Erősített gél lak</label>
        </div>
        <div>
          <input type="radio" id="artificial_nails" name="nail" />
          <label for="artificial_nails">Épített műköröm</label>
        </div>
        <h4>Díszítés</h4>
        <div>
          <input type="checkbox" id="one_color" />
          <label for="one_color">Egy színű</label>
        </div>

        <div>
          <input type="checkbox" id="two_color" />
          <label for="two_color">Két színű</label>
        </div>
        <div>
          <input type="checkbox" id="more_colors" />
          <label for="more_colors">Három vagy több szín</label>
        </div>
        <div>
          <input type="checkbox" id="stones" />
          <label for="stones">Köves díszítés</label>
        </div>
        <h4>Épített köröm mérete</h4>
        <select name="size" id="size">
          <option value="-">-</option>
          <option value="S">S</option>
          <option value="M">M</option>
          <option value="L">L</option>
          <option value="XL">XL</option>
          <option value="XXL">XXL</option>
        </select>
        <h4>Egyéb üzenet</h4>
        <div>
          <textarea name="massage" id="massage" cols="30" rows="10"></textarea>
        </div>
      
        <div class="protection">
           <input type="checkbox" id="data_protection" />
          <label for="data_protection">Elfogadom az <a href="adatvedelem.html" target="_blank">adatvédelmi feltételeket</a>  és hozzájárulásom adom, <br>hogy a megadott adataimat a Körömparadicsom saját célra kezelje.</label>
        </div>
        <button><b>Küldés</b></button>
      </form>

     
    </div>

    <footer>
      <iframe
        src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d2695.2919147776274!2d19.065065176121426!3d47.5037059711806!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x4741dc6f74ced879%3A0xb6ddf789c6d02257!2sBudapest%2C%20Kir%C3%A1ly%20u.%2071%2C%201077!5e0!3m2!1shu!2shu!4v1699533678685!5m2!1shu!2shu"
        width="600"
        height="450"
        style="border: 0"
        allowfullscreen=""
        loading="lazy"
        referrerpolicy="no-referrer-when-downgrade"
      ></iframe>
    </footer>
