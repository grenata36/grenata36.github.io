<!DOCTYPE html>
<html lang="hu">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="discription"
      content="Fontos számodra, hogy a kezed ápolt legyen? Szereted az egyszerű körmöket? Esetleg valami extrém megjelenésre vágysz? Jelentkezz be, és csináljuk meg együtt álmaid körmét!"
    />
    <link rel="stylesheet" href="css/styles.css" />
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <title>Körömparadicsom | Munkáim</title>
  </head>
  <body>
    <div class="contener">
      <header>
        <h1>Körömparadicsom</h1>
      </header>
      <nav>
        <a href="index.html">Főoldal</a>
        <a href="szolgaltatasok.html">Szolgáltatások</a>
        <a href="munkaim.html">Munkáim</a>
        <a href="elerhetoseg.html">Elérhetőség</a>
      </nav>
    <div id="gallery"></div>
<h2>Munkáim</h2>
    
      <div class="gallery-container">
     
        <img src="img/korom_1.jpg" alt="kép 1" class="gallery-image" data-large="img/korom_1.jpg">
        <img src="img/korom_2.jpg" alt="kép 2" class="gallery-image" data-large="img/korom_2.jpg">
        <img src="img/korom_3.jpg" alt="kép 3" class="gallery-image" data-large="img/korom_3.jpg">
        <img src="img/korom_4.jpg" alt="kép 4" class="gallery-image" data-large="img/korom_4.jpg">
        <img src="img/korom_5.jpg" alt="kép 5" class="gallery-image" data-large="img/korom_5.jpg">
        <img src="img/korom_6.jpg" alt="kép 6" class="gallery-image" data-large="img/korom_6.jpg">
        <img src="img/korom_7.jpg" alt="kép 7" class="gallery-image" data-large="img/korom_7.jpg">
        <img src="img/korom_8.jpg" alt="kép 8" class="gallery-image" data-large="img/korom_8.jpg">
        <img src="img/korom_9.jpg" alt="kép 9" class="gallery-image" data-large="img/korom_9.jpg">
        <img src="img/korom_10.jpg" alt="kép 10" class="gallery-image" data-large="img/korom_10.jpg">
      </div>
      
      <div id="myModal" class="modal">
        <span class="close">&times;</span>
        <div class="modal-content">
          <img id="modal-image" src="" alt="Nagy méretű kép">
        </div>
      </div>

 
<script>
$(document).ready(function() {
  // Kattintás esemény a képekre
  $('.gallery-image').click(function() {
    // Nagy kép beállítása és modális ablak megjelenítése
    $('#modal-image').attr('src', $(this).data('large'));
    $('#myModal').fadeIn();
  });

  // Bezáró gomb és modális háttér kattintás eseménye
  $('.close, #myModal').click(function() {
    $('#myModal').fadeOut();
  });

  // Megakadályozza a modális kép kattintását, hogy bezárja a modális ablakot
  $('#modal-image').click(function(event) {
    event.stopPropagation();
  });
});
</script>
  </body>
</html>
